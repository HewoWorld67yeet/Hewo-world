            height: 100vh;

        let proactiveChatTimer = 0; // Timer to trigger chaotic, talkative bot-to-bot radio conversations

        function pseudoNoise(x, z, seed) {
            let h = Math.sin(x * 12.9898 + z * 78.233 + seed) * 43758.5453123;
            return h - Math.floor(h);
        }

        function getRoadFactor(x, z) {
            const distNS = Math.abs(x);
            const distEW = Math.abs(z);
            const radius = Math.sqrt(x*x + z*z);
            const distRing = Math.abs(radius - 80);

            const minDist = Math.min(distNS, distEW, distRing);

            if (minDist < 5.0) return 0.0; // Perfect flat asphalt
            if (minDist < 10.0) return (minDist - 5.0) / 5.0; // smooth slope shoulder
            return 1.0; // rough terrain
        }

        function getHeight(x, z) {
            if (isNaN(x) || !isFinite(x) || isNaN(z) || !isFinite(z)) return 0;
            // Force map bounds
            const bound = (MAP_SIZE / 2) - 1;
            const clampedX = Math.max(-bound, Math.min(bound, x));
            const clampedZ = Math.max(-bound, Math.min(bound, z));

            const distToSpawn = Math.sqrt(Math.pow(clampedX - SPAWN_X, 2) + Math.pow(clampedZ - SPAWN_Z, 2));
            if (distToSpawn < 40.0) return 0.0;

            let y = Math.sin(clampedX * 0.03 + terrainSeed) * Math.cos(clampedZ * 0.03) * 11.0;
            y += Math.sin(clampedX * 0.09) * Math.sin(clampedZ * 0.09) * 4.0;
            y += pseudoNoise(clampedX, clampedZ, terrainSeed) * 1.0;
            
            const roadInfluence = getRoadFactor(clampedX, clampedZ);
            return y * roadInfluence;
        }

        function getRandomRoadPosition() {
            const roadType = Math.floor(Math.random() * 3);
            let rx = 0, rz = 0;
            
            if (roadType === 0) { // North-South Highway
                rx = 0;
                rz = (Math.random() - 0.5) * (MAP_SIZE - 40);
            } else if (roadType === 1) { // East-West Highway
                rx = (Math.random() - 0.5) * (MAP_SIZE - 40);
                rz = 0;
            } else { // Circular Ring Bypass (Radius 80)
                const angle = Math.random() * Math.PI * 2;
                rx = 80 * Math.cos(angle);
                rz = 80 * Math.sin(angle);
            }

            const distToSpawn = Math.sqrt(Math.pow(rx - SPAWN_X, 2) + Math.pow(rz - SPAWN_Z, 2));
            if (distToSpawn < 50.0) {
                return getRandomRoadPosition(); 
            }
            return new THREE.Vector3(rx, getHeight(rx, rz) + 1.3, rz);
        }

        function initAudio() {
            if (audioCtx) return;
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
                
                engineOsc = audioCtx.createOscillator();
                engineGain = audioCtx.createGain();
                engineOsc.type = 'sawtooth';
                engineOsc.frequency.setValueAtTime(32, audioCtx.currentTime);
                
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(140, audioCtx.currentTime);
                filter.Q.setValueAtTime(5, audioCtx.currentTime);

                engineOsc.connect(filter);
                filter.connect(engineGain);
                engineGain.connect(audioCtx.destination);
                engineGain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                engineOsc.start();

                heartbeatOsc = audioCtx.createOscillator();
                heartbeatGain = audioCtx.createGain();
                heartbeatOsc.type = 'sine';
                heartbeatOsc.frequency.setValueAtTime(45, audioCtx.currentTime);
                
                heartbeatOsc.connect(heartbeatGain);
                heartbeatGain.connect(audioCtx.destination);
                heartbeatGain.gain.setValueAtTime(0.0, audioCtx.currentTime); 
                heartbeatOsc.start();
            } catch (e) {
                console.warn("AudioContext failed to boot.");
            }
        }

        function playVineBoomCrashSound(intensity = 1.0, isWaterSplash = false) {
            if (!audioCtx) initAudio();
            if (!audioCtx) return;
            try {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                const now = audioCtx.currentTime;
                const volume = Math.min(1.0, intensity * 0.45);

                // --- LAYER 1: Deep cinematic sliding sub-bass ---
                const subOsc = audioCtx.createOscillator();
                const subGain = audioCtx.createGain();
                subOsc.type = 'sine';
                subOsc.frequency.setValueAtTime(isWaterSplash ? 90 : 125, now);
                subOsc.frequency.exponentialRampToValueAtTime(isWaterSplash ? 20 : 30, now + 0.9);

                subGain.gain.setValueAtTime(volume * 0.9, now);
                subGain.gain.exponentialRampToValueAtTime(0.001, now + 1.3);

                // --- LAYER 2: Lowpass filter (heavier dampening if splash) ---
                const growlOsc = audioCtx.createOscillator();
                const growlGain = audioCtx.createGain();
                growlOsc.type = 'triangle';
                growlOsc.frequency.setValueAtTime(isWaterSplash ? 50 : 85, now);
                growlOsc.frequency.exponentialRampToValueAtTime(20, now + 0.6);

                const dist = audioCtx.createWaveShaper();
                function makeDistortionCurve(amount) {
                    const k = typeof amount === 'number' ? amount : 50;
                    const n_samples = 44100;
                    const curve = new Float32Array(n_samples);
                    const deg = Math.PI / 180;
                    for (let i = 0 ; i < n_samples; ++i ) {
                        const x = (i * 2) / n_samples - 1;
                        curve[i] = ( (3 + k) * x * 20 * deg ) / ( Math.PI + k * Math.abs(x) );
                    }
                    return curve;
                }
                dist.curve = makeDistortionCurve(isWaterSplash ? 20 : 75);
                dist.oversample = '4x';

                const lowpass = audioCtx.createBiquadFilter();
                lowpass.type = 'lowpass';
                lowpass.frequency.setValueAtTime(isWaterSplash ? 110 : 180, now);

                growlGain.gain.setValueAtTime(volume * 0.5, now);
                growlGain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);

                // Signal routing
                subOsc.connect(subGain);
                subGain.connect(audioCtx.destination);

                growlOsc.connect(dist);
                dist.connect(lowpass);
                lowpass.connect(growlGain);
                growlGain.connect(audioCtx.destination);

                subOsc.start(now);
                growlOsc.start(now);

                subOsc.stop(now + 1.4);
                growlOsc.stop(now + 0.9);

                cameraShakeAmount = Math.min(1.5, intensity * 0.35);

            } catch (e) {
                console.warn("Meme Vine Boom synthesis failed gracefully:", e);
            }
        }

        function deformChassis(impactPointLocal, forceVectorLocal, forceMagnitude) {
            if (!busBodyMesh) return;

            if (isNaN(forceMagnitude) || !isFinite(forceMagnitude)) return;
            if (isNaN(impactPointLocal.x) || isNaN(impactPointLocal.y) || isNaN(impactPointLocal.z)) return;
            if (isNaN(forceVectorLocal.x) || isNaN(forceVectorLocal.y) || isNaN(forceVectorLocal.z)) return;

            const stiffness = 0.94; 
            const damageFactor = Math.min(0.7, forceMagnitude * 0.12);
            
            let vertChanged = false;
            const posAttr = busBodyMesh.geometry.attributes.position;
            const tempVert = new THREE.Vector3();

            for (let i = 0; i < posAttr.count; i++) {
                tempVert.set(posAttr.getX(i), posAttr.getY(i), posAttr.getZ(i));
                
                if (isNaN(tempVert.x) || isNaN(tempVert.y) || isNaN(tempVert.z)) {
                    tempVert.copy(originalVertices[i]);
                    posAttr.setXYZ(i, tempVert.x, tempVert.y, tempVert.z);
                    vertChanged = true;
                    continue;
                }

                const dist = tempVert.distanceTo(impactPointLocal);
                if (isNaN(dist)) continue;

                if (dist < 2.0) {
                    const strength = (2.0 - dist) / 2.0;
                    const deformAmount = forceVectorLocal.clone().multiplyScalar(strength * damageFactor * (1.0 - stiffness));
                    
                    if (isFinite(deformAmount.x) && isFinite(deformAmount.y) && isFinite(deformAmount.z)) {
                        tempVert.add(deformAmount);

                        const distFromOriginal = tempVert.distanceTo(originalVertices[i]);
                        if (!isNaN(distFromOriginal) && distFromOriginal > 1.2) {
                            const clampedDir = tempVert.clone().sub(originalVertices[i]).normalize();
                            tempVert.copy(originalVertices[i]).addScaledVector(clampedDir, 1.2);
                        }

                        if (isFinite(tempVert.x) && isFinite(tempVert.y) && isFinite(tempVert.z)) {
                            deformedVertices[i].copy(tempVert);
                            posAttr.setXYZ(i, tempVert.x, tempVert.y, tempVert.z);
                            vertChanged = true;
                        }
                    }
                }
            }

            if (vertChanged) {
                posAttr.needsUpdate = true;
                busBodyMesh.geometry.computeVertexNormals();
                busBodyMesh.geometry.computeBoundingBox();
                busBodyMesh.geometry.computeBoundingSphere();
                
                chassisIntegrity = Math.max(0.1, chassisIntegrity - (forceMagnitude * 0.015));
                updateDamageHUD();

                const worldPos = busGroup.localToWorld(impactPointLocal.clone());
                triggerCrashSparks(worldPos, forceMagnitude);
                
                // Trigger Vine Boom crash proportional to impact velocity
                playVineBoomCrashSound(forceMagnitude);
            }
        }

        function createRealisticTree(scaleMultiplier = 1.0) {
            const treeGroup = new THREE.Group();

            const trunkHeight = (3.5 + Math.random() * 2.5) * scaleMultiplier;
            const trunkRadiusBottom = (0.35 + Math.random() * 0.15) * scaleMultiplier;
            const trunkRadiusTop = trunkRadiusBottom * 0.6;
            const trunkGeo = new THREE.CylinderGeometry(trunkRadiusTop, trunkRadiusBottom, trunkHeight, 8);
            const trunkMat = new THREE.MeshStandardMaterial({
                color: 0x5c4033, 
                roughness: 0.95,
                metalness: 0.05,
                flatShading: true
            });
            const trunkMesh = new THREE.Mesh(trunkGeo, trunkMat);
            trunkMesh.position.y = trunkHeight / 2;
            treeGroup.add(trunkMesh);

            const branchCount = 2 + Math.floor(Math.random() * 2);
            for (let b = 0; b < branchCount; b++) {
                const bLength = trunkHeight * 0.35;
                const bRadius = trunkRadiusTop * 0.7;
                const branchGeo = new THREE.CylinderGeometry(bRadius * 0.5, bRadius, bLength, 5);
                const branchMesh = new THREE.Mesh(branchGeo, trunkMat);
                
                const bY = (trunkHeight * 0.45) + (Math.random() * trunkHeight * 0.3);
                branchMesh.position.set(0, bY, 0);
                
                branchMesh.rotation.z = (0.5 + Math.random() * 0.4) * (Math.random() > 0.5 ? 1 : -1);
                branchMesh.rotation.y = Math.random() * Math.PI * 2;
                branchMesh.translateY(bLength / 2);
                treeGroup.add(branchMesh);
            }

            const foliageGroup = new THREE.Group();
            foliageGroup.position.y = trunkHeight - (0.4 * scaleMultiplier);

            const foliageColors = [
                0x1e4620, 
                0x2e6f40, 
                0x3f9157, 
                0x153e15  
            ];

            const layerCount = 4 + Math.floor(Math.random() * 3);
            for (let l = 0; l < layerCount; l++) {
                const foliageRadius = (1.1 + Math.random() * 1.0) * scaleMultiplier;
                const foliageGeo = new THREE.DodecahedronGeometry(foliageRadius, 1);
                const foliageMat = new THREE.MeshStandardMaterial({
                    color: foliageColors[l % foliageColors.length],
                    roughness: 0.9,
                    metalness: 0.05,
                    flatShading: true
                });
                const foliageMesh = new THREE.Mesh(foliageGeo, foliageMat);

                foliageMesh.position.set(
                    (Math.random() - 0.5) * 1.4 * scaleMultiplier,
                    (l * 0.75 * scaleMultiplier) + (Math.random() - 0.5) * 0.4 * scaleMultiplier,
                    (Math.random() - 0.5) * 1.4 * scaleMultiplier
                );
                
                foliageGroup.add(foliageMesh);
            }

            treeGroup.add(foliageGroup);
            return treeGroup;
        }

        function generateWorldEntities() {
            // Remove previous
            boulders.forEach(b => scene.remove(b));
            boulders = [];
            treeEntities.forEach(t => scene.remove(t));
            treeEntities = [];
            cityBuildings.forEach(b => scene.remove(b));
            cityBuildings = [];
            activeCoins.forEach(c => scene.remove(c));
            activeCoins = [];
            stations.forEach(s => scene.remove(s.mesh));
            stations = [];

            const playerPos = isDriving ? position : driverPosition;

            // Render realistic scattered forest trees
            for (let i = 0; i < TREE_COUNT; i++) {
                let tx = (Math.random() - 0.5) * (MAP_SIZE - 20);
                let tz = (Math.random() - 0.5) * (MAP_SIZE - 20);

                const distToSpawn = Math.sqrt(Math.pow(tx - SPAWN_X, 2) + Math.pow(tz - SPAWN_Z, 2));
                const distToPlayer = playerPos.distanceTo(new THREE.Vector3(tx, playerPos.y, tz));
                const roadFac = getRoadFactor(tx, tz);
                const terrainHeight = getHeight(tx, tz);

                // No trees in deep lakes!
                if (distToSpawn < 40.0 || distToPlayer < 25.0 || roadFac < 0.8 || terrainHeight < WATER_LEVEL) {
                    continue; 
                }

                const ty = terrainHeight - 0.1;
                const treeScale = 0.8 + Math.random() * 0.9;
                const tree = createRealisticTree(treeScale);
                tree.position.set(tx, ty, tz);
                
                tree.rotation.y = Math.random() * Math.PI * 2;
                scene.add(tree);
                treeEntities.push(tree);
            }

            // Scatter standard stony boulders
            for (let i = 0; i < BOULDER_COUNT; i++) {
                let bx = (Math.random() - 0.5) * (MAP_SIZE - 20);
                let bz = (Math.random() - 0.5) * (MAP_SIZE - 20);

                const distToSpawn = Math.sqrt(Math.pow(bx - SPAWN_X, 2) + Math.pow(bz - SPAWN_Z, 2));
                const distToPlayer = playerPos.distanceTo(new THREE.Vector3(bx, playerPos.y, bz));
                const roadFac = getRoadFactor(bx, bz);
                const terrainHeight = getHeight(bx, bz);

                if (distToSpawn < 40.0 || distToPlayer < 25.0 || roadFac < 0.85 || terrainHeight < WATER_LEVEL) continue;

                const by = terrainHeight - 0.2;
                const scale = 1.0 + Math.random() * 3.5;

                const geo = new THREE.DodecahedronGeometry(scale, 1);
                const mat = new THREE.MeshStandardMaterial({
                    color: 0x44414d,
                    roughness: 0.95,
                    metalness: 0.1,
                    flatShading: true
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(bx, by, bz);
                mesh.rotation.set(Math.random() * 6, Math.random() * 6, 0);
                scene.add(mesh);
                boulders.push(mesh);
            }

            // Skyscrapers
            const blockWidth = 5.0;
            for (let i = 0; i < SKYSCRAPER_COUNT; i++) {
                let sx = (Math.random() - 0.5) * (MAP_SIZE - 40);
                let sz = (Math.random() - 0.5) * (MAP_SIZE - 40);

                const distToPlayer = playerPos.distanceTo(new THREE.Vector3(sx, playerPos.y, sz));
                const roadFac = getRoadFactor(sx, sz);
                const terrainHeight = getHeight(sx, sz);

                if (distToSpawn < 40.0 || distToPlayer < 25.0 || roadFac < 0.85 || terrainHeight < WATER_LEVEL + 1.0) continue;

                const height = 15.0 + Math.random() * 30.0;
                const sy = terrainHeight + (height / 2);

                const geo = new THREE.BoxGeometry(blockWidth, height, blockWidth);
                const mat = new THREE.MeshStandardMaterial({
                    color: 0x1d2436,
                    roughness: 0.4,
                    metalness: 0.8
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(sx, sy, sz);
                scene.add(mesh);
                cityBuildings.push(mesh);
            }

            // Emissive Gold Coins (Place on lands or floating over water!)
            for (let i = 0; i < COIN_COUNT; i++) {
                const rx = (Math.random() - 0.5) * (MAP_SIZE - 40);
                const rz = (Math.random() - 0.5) * (MAP_SIZE - 40);
                const landY = getHeight(rx, rz);
                const ry = Math.max(landY, WATER_LEVEL) + 1.4; 

                const coinGeo = new THREE.CylinderGeometry(0.7, 0.7, 0.2, 12);
                coinGeo.rotateX(Math.PI / 2);
                const coinMat = new THREE.MeshStandardMaterial({
                    color: 0xffcc00,
                    metalness: 0.9,
                    roughness: 0.1,
                    emissive: 0xffaa00,
                    emissiveIntensity: 0.4
                });
                const coin = new THREE.Mesh(coinGeo, coinMat);
                coin.position.set(rx, ry, rz);
                scene.add(coin);
                activeCoins.push(coin);
            }

            // Transit Stations
            const stationPositions = [
                new THREE.Vector3(0, getHeight(0, 80) + 1.0, 80),
                new THREE.Vector3(-80, getHeight(-80, 0) + 1.0, 0),
                new THREE.Vector3(80, getHeight(80, 0) + 1.0, 0)

                scene.add(mesh);
                stations.push({ mesh, position: pos, id: idx });
            });
        }

            }
        }

        function buildITChasers() {
            chasers.forEach(c => scene.remove(c.mesh));
            chasers = [];

            const spiderMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8, metalness: 0.9 });
            const legMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
            const glowMat = new THREE.MeshBasicMaterial({ color: 0xff0044 });

            const spawnPoints = [
                new THREE.Vector3(150, 10, -150),
                new THREE.Vector3(120, 10, 120),
                new THREE.Vector3(-120, 10, -120)
            ];

            spawnPoints.forEach((spawn, idx) => {
                const group = new THREE.Group();
                group.position.copy(spawn);

                // Creepy crawler body
                const bodyGeo = new THREE.SphereGeometry(1.2, 16, 16);
                const body = new THREE.Mesh(bodyGeo, spiderMat);
                body.position.set(0, 1.5, 0);
                group.add(body);

                // Anomaly mechanical eye
                const eyeGeo = new THREE.SphereGeometry(0.4, 8, 8);
                const eye = new THREE.Mesh(eyeGeo, glowMat);
                eye.position.set(0, 1.8, 0.9);
                group.add(eye);

                // Red Spotlight Cone
                const coneGeo = new THREE.ConeGeometry(5.0, 20.0, 16, 1, true);
                coneGeo.rotateX(-Math.PI / 2);
                const coneMat = new THREE.MeshBasicMaterial({
                    color: 0xff0033,
                    transparent: true,
                    opacity: 0.35,
                    blending: THREE.AdditiveBlending
                });
                const beam = new THREE.Mesh(coneGeo, coneMat);
                beam.position.set(0, 1.8, 10.9);
                group.add(beam);

                // 6 dynamic crawling jointed legs
                const legs = [];
                for (let i = 0; i < 6; i++) {
                    const legGroup = new THREE.Group();
                    const angle = (i / 6) * Math.PI * 2;
                    legGroup.rotation.y = angle;

                    const segmentGeo = new THREE.BoxGeometry(0.2, 0.2, 2.4);
                    const segment = new THREE.Mesh(segmentGeo, legMat);
                    segment.position.set(0, 0, 1.2);
                    legGroup.add(segment);

                    legGroup.position.set(Math.cos(angle) * 1.0, 1.5, Math.sin(angle) * 1.0);
                    group.add(legGroup);
                    legs.push(legGroup);
                }

                scene.add(group);
                chasers.push({
                    mesh: group,
                    legs: legs,
                    position: spawn.clone(),
                    id: idx,
                    speed: 6.5 + (idx * 1.5)
                });
            });
        }

        function initGraphics() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0xb0d8ff, 0.0028); 

            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 800);

            renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = false;
            container.appendChild(renderer.domElement);

            ambientLight = new THREE.AmbientLight(0xffffff, 0.85);
            scene.add(ambientLight);

            sunLight = new THREE.DirectionalLight(0xfffaed, 1.3);
            sunLight.position.set(100, 150, 50);
            scene.add(sunLight);

            // Render high-poly terrain mesh
            const terrainGeo = new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE, TERRAIN_SEGMENTS, TERRAIN_SEGMENTS);
            terrainGeo.rotateX(-Math.PI / 2);

            const posAttr = terrainGeo.attributes.position;
            const colors = [];
            for (let i = 0; i < posAttr.count; i++) {
                const tx = posAttr.getX(i);
                const tz = posAttr.getZ(i);
                const ty = getHeight(tx, tz);
                posAttr.setY(i, ty);

                const roadFac = getRoadFactor(tx, tz);
                if (roadFac < 0.1) {
                    colors.push(0.18, 0.18, 0.22); 
                } else if (roadFac < 0.7) {
                    colors.push(0.3, 0.28, 0.3); 
                } else {
                    colors.push(0.15, 0.38, 0.18); 
                }
            }

            terrainGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            terrainGeo.computeVertexNormals();

            const terrainMat = new THREE.MeshStandardMaterial({
                vertexColors: true,
                roughness: 0.9,
                metalness: 0.05,
                flatShading: true
            });

            terrainMesh = new THREE.Mesh(terrainGeo, terrainMat);
            scene.add(terrainMesh);

            // Render dynamic wavy water plane
            const waterGeo = new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE, 60, 60);
            waterGeo.rotateX(-Math.PI / 2);
            
            const waterMat = new THREE.MeshStandardMaterial({
                color: 0x0f5e73, // Teal blue transparent water
                roughness: 0.1,
                metalness: 0.8,
                transparent: true,
                opacity: 0.8,
                flatShading: true
            });

            waterMesh = new THREE.Mesh(waterGeo, waterMat);
            waterMesh.position.y = WATER_LEVEL;
            scene.add(waterMesh);

            clock = new THREE.Clock();

            generateWorldEntities();
            buildPlayerBus();
            buildAIBuses();
            buildITChasers();

            updateCamera(0.016);
        }

        function updateCamera(dt) {
            if (!busGroup) return;

            const targetPos = isDriving ? position : driverPosition;
            const targetRot = isDriving ? rotationY : driverRotationY;

            if (isFirstCameraFrame) {
                const backOffset = new THREE.Vector3(0, 5, 13).applyAxisAngle(new THREE.Vector3(0, 1, 0), targetRot);
                camera.position.copy(targetPos).add(backOffset);
                camera.lookAt(targetPos);
                isFirstCameraFrame = false;
                return;
            }

            let idealCamPos = new THREE.Vector3();

            if (cameraMode === 0) { // Chase Back
                const idealOffset = new THREE.Vector3(0, 5.0, 14.5).applyAxisAngle(new THREE.Vector3(0, 1, 0), targetRot);
                idealCamPos.copy(targetPos).add(idealOffset);
                camera.position.lerp(idealCamPos, dt * 6.0);
                camera.lookAt(targetPos);
            } else if (cameraMode === 1) { // Chase Front
                const idealOffset = new THREE.Vector3(0, 4.0, -13.5).applyAxisAngle(new THREE.Vector3(0, 1, 0), targetRot);
                idealCamPos.copy(targetPos).add(idealOffset);
                camera.position.lerp(idealCamPos, dt * 6.0);
                camera.lookAt(targetPos);
            } else { // Orbit Mode
                idealCamPos.set(
                    targetPos.x + orbitRadius * Math.sin(orbitAngleX) * Math.cos(orbitAngleY),
                    targetPos.y + orbitRadius * Math.sin(orbitAngleY) + 1.5,
                    targetPos.z + orbitRadius * Math.cos(orbitAngleX) * Math.cos(orbitAngleY)
                );
                camera.position.lerp(idealCamPos, dt * 12.0);
                camera.lookAt(targetPos.clone().add(new THREE.Vector3(0, 1.0, 0)));
            }

            // Apply screenshake translation offsets
            if (cameraShakeAmount > 0.005) {
                camera.position.x += (Math.random() - 0.5) * cameraShakeAmount;
                camera.position.y += (Math.random() - 0.5) * cameraShakeAmount;
                camera.position.z += (Math.random() - 0.5) * cameraShakeAmount;
                cameraShakeAmount *= 0.88; 
            }
        }

        function updateBusPhysics(dt) {
            if (!isDriving) return;

            const time = clock.getElapsedTime();
            const localWaveY = WATER_LEVEL + Math.sin(position.x * 0.05 + time * 1.5) * 0.4 + Math.cos(position.z * 0.05 + time * 1.2) * 0.3;
            let terrainHeight = getHeight(position.x, position.z);

            // Determine water submergence depth
            const busWaterDepth = (localWaveY + 0.3) - position.y;
            const isSubmerged = busWaterDepth > -1.0;

            // Warn Player Wading in Lake
            const warningEl = document.getElementById('warning-board');
            if (warningEl) {
                if (busWaterDepth > 0) {
                    warningEl.classList.remove('scale-0');
                    warningEl.classList.add('scale-100');
                    const warnTxt = document.getElementById('warning-text');
                    const warnIcon = document.getElementById('warning-icon');
                    if (warnTxt) warnTxt.innerText = "WADING FLOATING DETECTED!";
                    if (warnIcon) warnIcon.className = "fa-solid fa-water animate-bounce text-cyan-300";
                } else {
                    warningEl.classList.remove('scale-100');
                    warningEl.classList.add('scale-0');
                }
            }

            // Ceiling Clamp
            if (position.y > terrainHeight + 30.0) {
                position.y = terrainHeight + 30.0;
                if (velocity.y > 0) {
                    velocity.y = -8.0; 
                }
            }

            const isGrounded = position.y <= terrainHeight + 1.2;
            const gravityForce = -48.0; 

            // Air & Fluid Physics Model
            if (isSubmerged) {
                // Buoyancy Lift Force (Bobbing & Floating on waves)
                if (busWaterDepth > 0) {
                    const buoyancyFactor = Math.min(3.5, busWaterDepth + 1.2);
                    velocity.y += 65.0 * buoyancyFactor * dt;

                    // Apply water splash particles upon plunging down
                    if (velocity.y < -5.0 && Math.random() < 0.3) {
                        triggerWaterSplash(position, Math.abs(velocity.y));
                        playVineBoomCrashSound(Math.abs(velocity.y) * 0.15, true);
                    }
                }
                
                // Add fluid drag/dampening
                const waterDrag = 2.4;
                velocity.x *= (1.0 - waterDrag * dt);
                velocity.z *= (1.0 - waterDrag * dt);
                velocity.y *= (1.0 - 1.2 * dt);
            }

            if (!isGrounded) {
                velocity.y += gravityForce * dt;
                
                // Tilt control
                if (input.forward) pitch -= 2.0 * dt;
                if (input.backward) pitch += 2.0 * dt;
                if (input.left) roll += 2.0 * dt;
                if (input.right) roll -= 2.0 * dt;
            } else {
                position.y = terrainHeight + 0.9;
                if (velocity.y < -5.0) {
                    const crashIntensity = Math.abs(velocity.y) * 0.12;
                    triggerCrashSparks(position, Math.abs(velocity.y) * 0.5);
                    playVineBoomCrashSound(crashIntensity);
                }
                velocity.y = 0;
                
                pitch *= 0.85;
                roll *= 0.85;
            }

            if (position.y < terrainHeight + 0.9) {
                position.y = terrainHeight + 0.9;
                if (velocity.y < 0) velocity.y = 0;
            }

            // --- COLLISION RESOLVER: SKYSCRAPERS (AABB Solid Borders) ---
            const busHalfWidth = BUS_WIDTH / 2;
            const busHalfLength = BUS_LENGTH / 2;
            const skySize = 5.0;
            const skyHalf = skySize / 2;

            cityBuildings.forEach(building => {
                const bx = building.position.x;
                const bz = building.position.z;
                const by = building.position.y;
                const bHeight = building.geometry.parameters.height;
                const bHalfHeight = bHeight / 2;

                const busMinY = position.y;
                const busMaxY = position.y + BUS_HEIGHT;
                const bMinY = by - bHalfHeight;
                const bMaxY = by + bHalfHeight;

                if (busMaxY > bMinY && busMinY < bMaxY) {
                    const dx = position.x - bx;
                    const dz = position.z - bz;
                    const overlapX = (busHalfWidth + skyHalf) - Math.abs(dx);
                    const overlapZ = (busHalfLength + skyHalf) - Math.abs(dz);

                    if (overlapX > 0 && overlapZ > 0) {
                        if (overlapX < overlapZ) {
                            const pushSign = Math.sign(dx);
                            position.x += overlapX * pushSign;
                            velocity.x = 0;
                            deformChassis(new THREE.Vector3(pushSign * busHalfWidth, 1, 0), new THREE.Vector3(-pushSign, 0, 0), 4.5);
                        } else {
                            const pushSign = Math.sign(dz);
                            position.z += overlapZ * pushSign;
                            velocity.z = 0;
                            deformChassis(new THREE.Vector3(0, 1, pushSign * busHalfLength), new THREE.Vector3(0, 0, -pushSign), 4.5);
                        }
                    }
                }
            });

            // --- COLLISION RESOLVER: BOULDERS ---
            boulders.forEach(boulder => {
                const bRadius = 2.5; 
                const dist = position.distanceTo(boulder.position);
                const minDist = bRadius + 1.8;

                if (dist < minDist) {
                    const pushDir = position.clone().sub(boulder.position).normalize();
                    const overlap = minDist - dist;
                    position.addScaledVector(pushDir, overlap);
                    
                    const speed = velocity.length();
                    velocity.addScaledVector(pushDir, -velocity.dot(pushDir));
                    
                    const localImpact = busGroup.worldToLocal(boulder.position.clone());
                    deformChassis(localImpact, pushDir.clone().negate(), Math.max(2.5, speed * 0.55));
                }
            });

            // Engine Propulsion 
            const speedMultiplier = 1.0 + ((speedUpgradeLevel - 1) * 0.22);
            let baseMaxSpeed = input.nitro ? 45.0 : 26.0;

            // Water Drag dampens max speed
            if (busWaterDepth > 0) {
                baseMaxSpeed *= 0.45; // Slow wading paddle speeds
            }

            const maxSpeed = baseMaxSpeed * speedMultiplier;

            let targetForwardVelocity = 0;
            if (input.forward) targetForwardVelocity = maxSpeed;
            if (input.backward) targetForwardVelocity = -maxSpeed * 0.5;

            const forwardDir = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), rotationY);
            let currentForwardSpeed = velocity.dot(forwardDir);

            let engineForce = 0.0;
            if (input.forward || input.backward) {
                engineForce = (targetForwardVelocity - currentForwardSpeed) * (input.nitro ? 9.5 : 5.5);
            }

            velocity.addScaledVector(forwardDir, engineForce * dt);

            // Lateral slides
            const lateralDir = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), rotationY);
            let lateralSpeed = velocity.dot(lateralDir);
            
            // Slippery water drift
            const slideDamp = (busWaterDepth > 0) ? 1.0 : (input.handbrake ? 1.5 : 8.5);
            velocity.addScaledVector(lateralDir, -lateralSpeed * slideDamp * dt);

            // Steering
            const steeringSpeed = 2.4;
            if (input.left) steeringAngle = Math.min(0.55, steeringAngle + steeringSpeed * dt);
            else if (input.right) steeringAngle = Math.max(-0.55, steeringAngle - steeringSpeed * dt);
            else steeringAngle *= 0.8;

            const speedRatio = Math.abs(currentForwardSpeed) / 10.0;
            const yawFactor = Math.min(1.0, speedRatio) * Math.sign(currentForwardSpeed);
            rotationY += steeringAngle * yawFactor * 1.5 * dt;

            position.addScaledVector(velocity, dt);

            // Bound limits
            const bound = (MAP_SIZE / 2) - 3;
            if (position.x < -bound) { position.x = -bound; velocity.x = 0; }
            if (position.x > bound) { position.x = bound; velocity.x = 0; }
            if (position.z < -bound) { position.z = -bound; velocity.z = 0; }
            if (position.z > bound) { position.z = bound; velocity.z = 0; }

            busGroup.position.copy(position);
            busGroup.rotation.set(pitch, rotationY, roll);

            wheels.forEach(wheel => {
                if (wheel.isFront) {
                    wheel.mesh.rotation.y = steeringAngle;
                }
                wheel.mesh.rotation.x += currentForwardSpeed * 0.45 * dt;
            });

            // Handle audio
            let closestChaserDist = 999;
            chasers.forEach(ch => {
                const dist = position.distanceTo(ch.position);
                if (dist < closestChaserDist) closestChaserDist = dist;
            });

            if (audioCtx) {
                const absSpeed = Math.abs(currentForwardSpeed);
                const engineFreq = 30 + (absSpeed * 2.2);
                if (engineOsc) {
                    // Muffle pitch when submerged
                    engineOsc.frequency.setValueAtTime(busWaterDepth > 0 ? engineFreq * 0.65 : engineFreq, audioCtx.currentTime);
                }

                if (closestChaserDist < 60) {
                    const dangerRatio = 1.0 - (closestChaserDist / 60);
                    if (heartbeatGain) heartbeatGain.gain.setValueAtTime(dangerRatio * 0.35, audioCtx.currentTime);
                    if (heartbeatOsc) heartbeatOsc.frequency.setValueAtTime(35 + (dangerRatio * 90), audioCtx.currentTime);
                } else {
                    if (heartbeatGain) heartbeatGain.gain.setValueAtTime(0.0, audioCtx.currentTime);
                }
            }

            const dispSpeed = Math.abs(Math.floor(currentForwardSpeed * 3.2));
            const speedo = document.getElementById('speedometer');
            if (speedo) speedo.innerText = dispSpeed;

            const gearInd = document.getElementById('gear-indicator');
            if (gearInd) {
                if (currentForwardSpeed > 0.5) gearInd.innerText = "D";
                else if (currentForwardSpeed < -0.5) gearInd.innerText = "R";
                else gearInd.innerText = "N";
            }
        }

        function recoverBus() {
            if (!isDriving) return;
            const terrainHeight = getHeight(position.x, position.z);
            // Spawn safely on top of ground or water
            position.y = Math.max(terrainHeight, WATER_LEVEL) + 2.5; 
            velocity.set(0, 0, 0); 
            pitch = 0;
            roll = 0;
            rotationY = Math.PI / 4; 
            busGroup.position.copy(position);
            busGroup.rotation.set(pitch, rotationY, roll);
            playCatapultSound();
            
            addCommsChatLog("SYS", "Bus successfully recovered and flipped upright!");
        }

        function updateDriverPhysics(dt) {
            if (isDriving || !driverGroup) return;

            const time = clock.getElapsedTime();
            const localWaveY = WATER_LEVEL + Math.sin(driverPosition.x * 0.05 + time * 1.5) * 0.4 + Math.cos(driverPosition.z * 0.05 + time * 1.2) * 0.3;
            let terrainHeight = getHeight(driverPosition.x, driverPosition.z);

            const isSubmerged = driverPosition.y < localWaveY;
            let moveSpeed = 6.0;

            let moveDir = new THREE.Vector3(0, 0, 0);
            const forwardVec = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), driverRotationY);
            const rightVec = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), driverRotationY);

            if (input.forward) moveDir.add(forwardVec);
            if (input.backward) moveDir.add(forwardVec.clone().negate());
            if (input.left) driverRotationY += 3.5 * dt;
            if (input.right) driverRotationY -= 3.5 * dt;

            moveDir.normalize();

            if (isSubmerged) {
                // Swimming physics mode: slower, bobs on surface
                moveSpeed = 3.2; 
                driverVelocity.copy(moveDir).multiplyScalar(moveSpeed);
                
                // Bob on the animated water waves
                const floatTarget = localWaveY - 0.9;
                driverPosition.y = THREE.MathUtils.lerp(driverPosition.y, floatTarget, 8.0 * dt);
                driverVelocity.y = 0;
            } else {
                driverVelocity.copy(moveDir).multiplyScalar(moveSpeed);
                if (driverPosition.y > terrainHeight + 0.1) {
                    driverVelocity.y -= 24.0 * dt;
                } else {
                    driverPosition.y = terrainHeight;
                    driverVelocity.y = 0;
                }
            }

            driverPosition.addScaledVector(driverVelocity, dt);

            if (driverPosition.y < terrainHeight && !isSubmerged) {
                driverPosition.y = terrainHeight;
            }

            cityBuildings.forEach(building => {
                const bx = building.position.x;
                const bz = building.position.z;
                const dx = driverPosition.x - bx;
                const dz = driverPosition.z - bz;
                const bHalf = 2.5;

                if (Math.abs(dx) < bHalf + 0.5 && Math.abs(dz) < bHalf + 0.5) {
                    const overlapX = (bHalf + 0.5) - Math.abs(dx);
                    const overlapZ = (bHalf + 0.5) - Math.abs(dz);
                    if (overlapX < overlapZ) {
                        driverPosition.x += overlapX * Math.sign(dx);
                    } else {
                        driverPosition.z += overlapZ * Math.sign(dz);
                    }
                }
            });

            boulders.forEach(boulder => {
                const dist = driverPosition.distanceTo(boulder.position);
                const minDist = 3.1;
                if (dist < minDist) {
                    const pushDir = driverPosition.clone().sub(boulder.position).normalize();
                    const overlap = minDist - dist;
                    driverPosition.addScaledVector(pushDir, overlap);
                }
            });

            const bound = (MAP_SIZE / 2) - 4;
            driverPosition.clamp(new THREE.Vector3(-bound, -10, -bound), new THREE.Vector3(bound, 200, bound));

            driverGroup.position.copy(driverPosition);
            driverGroup.rotation.y = driverRotationY;

            if (moveDir.length() > 0.1) {
                legWiggle += dt * (isSubmerged ? 8.0 : 12.0);
                const leftLeg = driverGroup.children[2];
                const rightLeg = driverGroup.children[3];
                if (leftLeg && rightLeg) {
                    // Swimming paddle limbs or walking wiggles
                    leftLeg.rotation.x = Math.sin(legWiggle) * (isSubmerged ? 0.9 : 0.6);
                    rightLeg.rotation.x = -Math.sin(legWiggle) * (isSubmerged ? 0.9 : 0.6);
                }
            } else {
                const leftLeg = driverGroup.children[2];
                const rightLeg = driverGroup.children[3];
                if (leftLeg && rightLeg) {
                    leftLeg.rotation.x = 0;
                    rightLeg.rotation.x = 0;
                }
            }
        }

        function updateAIAndITPhysics(dt) {
            const escapeRadius = 40.0;

            aiBuses.forEach(ai => {
                let aiTerrainY = getHeight(ai.position.x, ai.position.z);
                
                let closestChaserDist = 999;
                let scaryChaser = null;
                chasers.forEach(ch => {
                    const dist = ai.position.distanceTo(ch.position);
                    if (dist < closestChaserDist) {
                        closestChaserDist = dist;
                        scaryChaser = ch;
                    }
                });

                if (closestChaserDist < escapeRadius && scaryChaser) {
                    const dirAway = ai.position.clone().sub(scaryChaser.position).setY(0).normalize();
                    const targetYaw = Math.atan2(dirAway.x, dirAway.z);
                    ai.rotationY = targetYaw; 

                    const driveSpeed = 18.0;
                    ai.velocity.copy(dirAway).multiplyScalar(driveSpeed);

                    if (Math.random() < 0.005) {
                        addCommsChatLog(ai.name, "CRAP IT'S BEHIND ME! ESCAPE OUT OF LAKE!!");
                    }
                } else {
                    const fwd = new THREE.Vector3(0, 0, 1).applyAxisAngle(new THREE.Vector3(0, 1, 0), ai.rotationY);
                    ai.velocity.copy(fwd).multiplyScalar(10.0);

                    if (Math.random() < 0.015) {
                        ai.rotationY += (Math.random() - 0.5) * 1.5;
                    }
                }

                ai.position.addScaledVector(ai.velocity, dt);

                // AI floating calculations
                const aiLocalWaveY = WATER_LEVEL + Math.sin(ai.position.x * 0.05 + clock.getElapsedTime() * 1.5) * 0.4 + Math.cos(ai.position.z * 0.05 + clock.getElapsedTime() * 1.2) * 0.3;
                const aiWaterDepth = aiLocalWaveY - ai.position.y;

                if (aiWaterDepth > 0) {
                    ai.position.y = aiLocalWaveY - 0.4; // float bob
                } else {
                    ai.position.y = aiTerrainY + 0.4; 
                }

                if (ai.position.y > aiTerrainY + 30.0) {
                    ai.position.y = aiTerrainY + 30.0;
                    ai.velocity.y = -10.0; 
                }

                const bound = (MAP_SIZE / 2) - 5;
                ai.position.clamp(new THREE.Vector3(-bound, -10, -bound), new THREE.Vector3(bound, 200, bound));

                ai.mesh.position.copy(ai.position);
                ai.mesh.rotation.y = ai.rotationY;
            });

            // Creepy Crawler Mechanical Spiders on Lake beds
            chasers.forEach((ch, idx) => {
                const terrainHeight = getHeight(ch.position.x, ch.position.z);
                const target = isDriving ? position : driverPosition;
                const distToTarget = ch.position.distanceTo(target);

                const dirToTarget = target.clone().sub(ch.position).setY(0).normalize();
                const speed = ch.speed;

                ch.position.addScaledVector(dirToTarget, speed * dt);
                
                // Crawlers stay firmly bound to terrain under the water (walking menacingly on lake floor!)
                ch.position.y = terrainHeight; 

                ch.mesh.position.copy(ch.position);
                
                const angle = Math.atan2(dirToTarget.x, dirToTarget.z);
                ch.mesh.rotation.y = angle;

                ch.legs.forEach((leg, legIdx) => {
                    const legSwing = Math.sin(clock.getElapsedTime() * 14.0 + legIdx) * 0.45;
                    leg.rotation.x = legSwing;
                });

                if (distToTarget < 5.2) {
                    if (isDriving) {
                        chassisIntegrity = Math.max(0.1, chassisIntegrity - 0.15);
                        updateDamageHUD();
                        
                        playVineBoomCrashSound(3.8);
                        
                        const pushDir = position.clone().sub(ch.position).setY(0.4).normalize();
                        velocity.copy(pushDir).multiplyScalar(32.0); 
                        triggerCrashSparks(position, 8.0, true);
                        addCommsChatLog("SYSTEM", "CRITICAL CONTACT! IT struck your chassis!");
                    } else {
                        driverPosition.set(SPAWN_X, 2, SPAWN_Z);
                        addCommsChatLog("SYSTEM", "Captured by the anomaly spider! Restored back to SW shelter.");
                        playVineBoomCrashSound(2.5);
                    }
                }
            });
        }

        async function fetchGeminiAIResponse(botName, userMessage) {
            const personality = botPersonalities[botName] || botPersonalities["Doge"];
            
            const metricsContext = `
                Scenario parameters:
                - Active meme bot name: ${botName}
                - Bot Personality Style Guide: ${personality.style}
                - Player speed: ${Math.floor(velocity.length() * 3.2)} km/h
                - Chassis damage integrity: ${Math.floor((1.0 - chassisIntegrity) * 100)}%
                - Safe coins collected: ${walletCoins}
                - Water level is -2.5. Lake wading is currently active.
                - Closest Mechanical Horror "IT" distance: ${Math.floor(position.distanceTo(chasers[0].position))} meters.
                - Current Upgrade Level: ${speedUpgradeLevel}
                - Cost to buy another speed upgrade: 5 coins
                - User message: "${userMessage}"
            `;

            const systemPrompt = `
                You are playing ${botName} inside a 3D physical soft-body survival bus simulator that now features lakes and swimming.
                You are communicating with the driver via walkie-talkie.
                IMPORTANT: You must be extremely chatty, highly expressive, talkative, and lean 100% into your personality style: ${personality.style}.
                Your reply must be detailed, funny, and contextually mention the player's speed, water/swimming wading, coins, or danger levels, but keep it strictly to under 3 sentences. Do NOT break character! Mention that speed upgrades cost only 5 coins now if applicable.
            `;

            const apiKey = ""; 
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;

            const payload = {
                contents: [{ parts: [{ text: metricsContext }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            try {
                const response = await fetch(apiUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                const aiText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (aiText) return aiText.trim();
            } catch (error) {
                console.warn("Gemini Flash API request failed. Falling back to local heuristics.", error);
            }

            const fallbackMemes = {
                "Doge": [`wow very swim! ${Math.floor(velocity.length()*3.2)} kmh! such splash! much 5 coins speed upgrades! help!`, "wow, anomaly is near! very wet lake!"],
                "GigaChad": ["Average floaty flyer fan vs average water floating gym champion. Wading build muscles, brother!", "Water resistance is temporary, mental gains are forever."],
                "Stonks": ["Collected coins only go up! Invest your 5 coins into a Speed upgrade!", "Aquatic wading correction! High portfolio volume!"],
                "Rickroll": ["Never gonna swim around and desert you!", "Floating from the horror, we're no strangers to love."]
            };

            const memes = fallbackMemes[botName] || fallbackMemes["Doge"];
            return memes[Math.floor(Math.random() * memes.length)];
        }

        function addCommsChatLog(sender, text) {
            const box = document.getElementById('chat-box');
            if (!box) return;

            const p = document.createElement('p');
            p.className = "leading-tight border-b border-slate-900 pb-1";
            
            let senderColor = "text-yellow-300";
            if (sender === "GigaChad") senderColor = "text-cyan-400 font-extrabold";
            else if (sender === "Doge") senderColor = "text-amber-300 font-extrabold";
            else if (sender === "Stonks") senderColor = "text-emerald-400 font-extrabold";
            else if (sender === "Rickroll") senderColor = "text-pink-400 font-extrabold";
            else if (sender === "Cheems") senderColor = "text-orange-300 font-extrabold";
            else if (sender === "Karen") senderColor = "text-red-400 font-extrabold";
            else if (sender === "Wojak") senderColor = "text-slate-400 font-extrabold";
            else if (sender === "Harumbe") senderColor = "text-green-400 font-extrabold";
            else if (sender === "YOU") senderColor = "text-indigo-400 font-extrabold";
            else if (sender.startsWith("AI THOUGHT")) senderColor = "text-blue-400 italic";

            p.innerHTML = `<span class="${senderColor}">[${sender}]:</span> <span class="text-slate-100 font-semibold">${text}</span>`;
            box.appendChild(p);
            box.scrollTop = box.scrollHeight;
        }

        function runProactiveChatter(dt) {
            proactiveChatTimer += dt;
            if (proactiveChatTimer > 7.0) {
                proactiveChatTimer = 0;
                
                const activeChatters = Object.keys(botPersonalities);
                const randomBot = activeChatters[Math.floor(Math.random() * activeChatters.length)];
                const personality = botPersonalities[randomBot];
                
                let phrase = personality.phrases[Math.floor(Math.random() * personality.phrases.length)];
                
                const currentDmg = Math.floor((1.0 - chassisIntegrity) * 100);
                const chaserDist = position.distanceTo(chasers[0].position);
                
                if (chaserDist < 50 && Math.random() < 0.5) {
                    if (randomBot === "Doge") phrase = "WOW! SPIDER EXTREMELY CLOSE! MUCH WET LAKE PANIC! VERY ESCAPE!!";
                    else if (randomBot === "GigaChad") phrase = "Stay calm King! Power paddle through the waves, maintain focus and drive!";
                    else if (randomBot === "Stonks") phrase = "CRASH INBOUND! Liquid assets flooded! ANOMALY ACQUISITION COMPLETED!";
                    else if (randomBot === "Karen") phrase = "This metallic spider just splashed my windshield! Call the Lake Patrol!";
                    else if (randomBot === "Cheems") phrase = "M-m-monster is in the lakem! I am shake-m-shaking!";
                    else if (randomBot === "Wojak") phrase = "IT is right there under the water... there's no hope, tfw we get crushed.";
                } else if (currentDmg > 50 && Math.random() < 0.4) {
                    if (randomBot === "Karen") phrase = "My bus is taking on water and damaged! I will complain to the county transit authorities!";
                    else if (randomBot === "GigaChad") phrase = "A heavy smash, brother. Repair the bus to restore your flotation momentum!";
                    else if (randomBot === "Stonks") phrase = "Chassis value is down 50%! VOLATILE! Time to buy the repair dip!";
                } else if (walletCoins >= 5 && Math.random() < 0.3) {
                    if (randomBot === "Stonks") phrase = "You have over 5 coins! Deploy capital immediately for a Speed Upgrade! High ROI guaranteed!";
                    else if (randomBot === "GigaChad") phrase = "You've got the weight in your pocket, brother! Drop 5 coins and pump up that engine size!";
                    else if (randomBot === "Cheems") phrase = "Spendm 5 coinms for speedy speedy busm upgrades!";
                }
                
                addCommsChatLog(randomBot, phrase);
            }
        }

        async function handleSendChat() {
            const inputField = document.getElementById('chat-input');
            if (!inputField) return;

            const message = inputField.value.trim();
            if (!message) return;

            addCommsChatLog("YOU", message);
            inputField.value = "";

            const activeBots = ["Doge", "GigaChad", "Stonks", "Rickroll"];
            const chosenBot = activeBots[Math.floor(Math.random() * activeBots.length)];

            addCommsChatLog("AI THOUGHT (" + chosenBot + ")", "Parsing telemetry metrics & aquatic depth ratios...");

            const responseText = await fetchGeminiAIResponse(chosenBot, message);
            addCommsChatLog(chosenBot, responseText);
        }

        function updateDamageHUD() {
            const dmgText = document.getElementById('damage-text');
            const dmgBar = document.getElementById('damage-bar');
            
            const damagePct = Math.floor((1.0 - chassisIntegrity) * 100);
            
            if (dmgText) dmgText.innerText = damagePct + "%";
            if (dmgBar) {
                dmgBar.style.width = damagePct + "%";
                if (damagePct > 70) {
                    dmgBar.className = "bg-gradient-to-r from-red-600 to-red-400 h-full w-0 transition-all duration-300";
                    if (dmgText) dmgText.className = "text-red-500 font-bold";
                } else if (damagePct > 35) {
                    dmgBar.className = "bg-gradient-to-r from-yellow-500 to-amber-400 h-full w-0 transition-all duration-300";
                    if (dmgText) dmgText.className = "text-yellow-400";
                } else {
                    dmgBar.className = "bg-gradient-to-r from-green-500 to-emerald-400 h-full w-0 transition-all duration-300";
                    if (dmgText) dmgText.className = "text-green-400";
                }
            }
        }

        function evaluateCoinCollections() {
            const collectDist = isDriving ? 3.0 : 1.5;
            const targetPos = isDriving ? position : driverPosition;

            for (let i = activeCoins.length - 1; i >= 0; i--) {
                const coin = activeCoins[i];
                if (targetPos.distanceTo(coin.position) < collectDist) {
                    scene.remove(coin);
                    activeCoins.splice(i, 1);
                    roundCoins++;
                    walletCoins++;
                    playCoinSound();

                    const elWallet = document.getElementById('coin-wallet');
                    const elRound = document.getElementById('coin-round');
                    if (elWallet) elWallet.innerText = walletCoins;
                    if (elRound) elRound.innerText = roundCoins;

                    addCommsChatLog("SYSTEM", "Collected gold coin! Total: " + walletCoins);
                }
            }
        }

        const isFocusInput = () => document.activeElement === document.getElementById('chat-input');

        window.addEventListener('keydown', (e) => {
            if (isFocusInput()) {
                if (e.key === 'Enter') handleSendChat();
                return; 
            }

            const key = e.key.toLowerCase();
            if (key === 'w' || e.key === 'ArrowUp') input.forward = true;
            if (key === 's' || e.key === 'ArrowDown') input.backward = true;
            if (key === 'a' || e.key === 'ArrowLeft') input.left = true;
            if (key === 'd' || e.key === 'ArrowRight') input.right = true;
            if (e.key === ' ' || key === 'spacebar') input.handbrake = true;
            if (e.shiftKey) input.nitro = true;

            if (key === 'r' || key === 'f') {
                recoverBus();
            }

            if (key === 'q') {
                toggleMagneticHitch();
            }
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || e.key === 'ArrowUp') input.forward = false;
            if (key === 's' || e.key === 'ArrowDown') input.backward = false;
            if (key === 'a' || e.key === 'ArrowLeft') input.left = false;
            if (key === 'd' || e.key === 'ArrowRight') input.right = false;
            if (e.key === ' ' || key === 'spacebar') input.handbrake = false;
            if (!e.shiftKey) input.nitro = false;
        });

        function toggleMagneticHitch() {
            if (!isDriving) return;

            if (hitchedBot) {
                hitchedBot = null;
                if (tetherVisual) {
                    scene.remove(tetherVisual);
                    tetherVisual = null;
                }
                addCommsChatLog("TOW", "Magnetic tow beam disconnected.");
                return;
            }

            let closestBot = null;
            let minDist = 22.0;

            aiBuses.forEach(bot => {
                const dist = position.distanceTo(bot.position);
                if (dist < minDist) {
                    minDist = dist;
                    closestBot = bot;
                }
            });

            if (closestBot) {
                hitchedBot = closestBot;
                addCommsChatLog("TOW", "Coupled magnetically to " + closestBot.name + "! Get ready for a tow ride!");
                playCatapultSound();

                const tetherGeo = new THREE.BufferGeometry().setFromPoints([position, closestBot.position]);
                const tetherMat = new THREE.LineBasicMaterial({ color: 0xff00bb, linewidth: 3 });
                tetherVisual = new THREE.Line(tetherGeo, tetherMat);
                scene.add(tetherVisual);
            } else {
                addCommsChatLog("TOW", "No close AI buses within the 22m magnetic sweep range.");
            }
        }

        function drawMinimap() {
            const canvas = document.getElementById('minimap');
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 90, 90);

            const mapToRadar = (val) => ((val + (MAP_SIZE / 2)) / MAP_SIZE) * 90;

            ctx.fillStyle = "rgba(12, 11, 20, 0.95)";
            ctx.fillRect(0, 0, 90, 90);

            const px = mapToRadar(isDriving ? position.x : driverPosition.x);
            const pz = mapToRadar(isDriving ? position.z : driverPosition.z);
            ctx.fillStyle = "#3b82f6"; 
            ctx.beginPath();
            ctx.arc(px, pz, 3.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#ef4444"; 
            chasers.forEach(ch => {
                const cx = mapToRadar(ch.position.x);
                const cz = mapToRadar(ch.position.z);
                ctx.beginPath();
                ctx.arc(cx, cz, 3.0, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.fillStyle = "#10b981"; 
            aiBuses.forEach(ai => {
                const ax = mapToRadar(ai.position.x);
                const az = mapToRadar(ai.position.z);
                ctx.beginPath();
                ctx.arc(ax, az, 1.5, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function toggleOnFootWalk() {
            if (isDriving) {
                isDriving = false;
                driverPosition.copy(position).add(new THREE.Vector3(4, 1.2, 4));
                driverRotationY = rotationY;

                driverGroup = new THREE.Group();
                
                const headGeo = new THREE.SphereGeometry(0.35, 8, 8);
                const headMat = new THREE.MeshBasicMaterial({ color: 0xffccaa });
                const head = new THREE.Mesh(headGeo, headMat);
                head.position.set(0, 1.7, 0);
                driverGroup.add(head);

                const bodyGeo = new THREE.BoxGeometry(0.5, 0.8, 0.3);
                const bodyMat = new THREE.MeshBasicMaterial({ color: 0x312e81 }); 
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.position.set(0, 1.1, 0);
                driverGroup.add(body);

                const legGeo = new THREE.BoxGeometry(0.18, 0.6, 0.18);
                const legMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
                const leftLeg = new THREE.Mesh(legGeo, legMat);
                leftLeg.position.set(-0.15, 0.4, 0);
                const rightLeg = new THREE.Mesh(legGeo, legMat);
                rightLeg.position.set(0.15, 0.4, 0);
                driverGroup.add(leftLeg);
                driverGroup.add(rightLeg);

                scene.add(driverGroup);

                const elWarpBtn = document.getElementById('btn-teleport-bus');
                const elWalkBtn = document.getElementById('btn-walk');
                if (elWarpBtn) elWarpBtn.classList.remove('hidden');
                if (elWalkBtn) elWalkBtn.innerHTML = '<i class="fa-solid fa-bus mr-1"></i> Enter Bus';
                addCommsChatLog("SYS", "On-Foot mode active. Floating lake swimming enabled!");
            } else {
                const distToBus = driverPosition.distanceTo(position);
                if (distToBus < 8.0) {
                    isDriving = true;
                    if (driverGroup) {
                        scene.remove(driverGroup);
                        driverGroup = null;
                    }
                    const elWarpBtn = document.getElementById('btn-teleport-bus');
                    const elWalkBtn = document.getElementById('btn-walk');
                    if (elWarpBtn) elWarpBtn.classList.add('hidden');
                    if (elWalkBtn) elWalkBtn.innerHTML = '<i class="fa-solid fa-shoe-prints mr-1 text-indigo-200"></i> Get Out / Walk';
                    addCommsChatLog("SYS", "Back inside cockpit controls!");
                } else {
                    addCommsChatLog("SYS", "Too far from your bus to board! swim closer (" + Math.floor(distToBus) + "m away).");
                }
            }
        }

        function warpBusHere() {
            if (isDriving) return;
            position.copy(driverPosition).add(new THREE.Vector3(0, 1.2, 0));
            velocity.set(0, 0, 0);
            busGroup.position.copy(position);
            playCatapultSound();
            addCommsChatLog("SYS", "Bus warped right to your swimming coordinates!");
        }

        function upgradeEngineSpeed() {
            if (walletCoins >= 5) {
                walletCoins -= 5;
                speedUpgradeLevel++;
                const elWallet = document.getElementById('coin-wallet');
                const elLvl = document.getElementById('speed-lvl-txt');
                if (elWallet) elWallet.innerText = walletCoins;
                if (elLvl) elLvl.innerText = `LVL ${speedUpgradeLevel} (+${(speedUpgradeLevel-1)*22}%)`;
                addCommsChatLog("UPGRADE", "Engine upgraded! Speed level increased for 5 coins.");
                playCoinSound();
            } else {
                addCommsChatLog("SYS", "Insufficient coins! Upgrades require 5 Gold Coins.");
            }
        }

        function repairChassis() {
            chassisIntegrity = 1.0;
            updateDamageHUD();
            playCoinSound();
            addCommsChatLog("SYS", "Bus repairs completed. Flotation integrity restored!");
        }

        function setCameraMode(mode) {
            cameraMode = mode;
            const modes = ['cam-chase-back', 'cam-chase-front', 'cam-orbit'];
            modes.forEach((id, idx) => {
                const btn = document.getElementById(id);
                if (!btn) return;
                if (idx === mode) {
                    btn.className = "cam-toggle px-2 py-1 text-[10px] font-black rounded-lg bg-yellow-500 text-slate-950";
                } else {
                    btn.className = "cam-toggle px-2 py-1 text-[10px] font-black rounded-lg text-slate-400 hover:text-white";
                }
            });
        }

        window.addEventListener('mousedown', (e) => {
            if (cameraMode !== 2) return;
            isMouseDown = true;
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('mousemove', (e) => {
            if (!isMouseDown || cameraMode !== 2) return;
            const deltaX = e.clientX - previousMousePosition.x;
            const deltaY = e.clientY - previousMousePosition.y;

            orbitAngleX -= deltaX * 0.005;
            orbitAngleY = Math.max(-0.5, Math.min(0.9, orbitAngleY + deltaY * 0.005));

            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('mouseup', () => isMouseDown = false);
        window.addEventListener('wheel', (e) => {
            if (cameraMode !== 2) return;
            orbitRadius = Math.max(6.0, Math.min(38.0, orbitRadius + e.deltaY * 0.02));
        });

        function bindEvent(id, eventName, handler) {
            const el = document.getElementById(id);
            if (el) {
                el.addEventListener(eventName, handler);
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            const dt = Math.min(0.03, clock.getDelta()); 

            const cycleRate = 0.002;
            const timeOfDay = clock.getElapsedTime() * cycleRate;

            const alwaysDayEl = document.getElementById('always-day');
            const alwaysDayChecked = alwaysDayEl ? alwaysDayEl.checked : true;

            if (alwaysDayChecked) {
                scene.fog.color.setHex(0xb0d8ff);
                renderer.setClearColor(0xb0d8ff);
                ambientLight.intensity = 0.85;
                sunLight.intensity = 1.3;
                sunLight.position.set(100, 150, 50);
            } else {
                const sinCycle = Math.sin(timeOfDay);
                const sunY = sinCycle * 150;
                sunLight.position.set(100, sunY, 50);

                if (sunY > 20) { 
                    scene.fog.color.setHex(0xb0d8ff);
                    renderer.setClearColor(0xb0d8ff);
                    ambientLight.intensity = 0.85;
                    sunLight.intensity = 1.3;
                } else if (sunY > -15) { 
                    scene.fog.color.setHex(0xfb923c);
                    renderer.setClearColor(0xfb923c);
                    ambientLight.intensity = 0.45;
                    sunLight.intensity = 0.6;
                } else { 
                    scene.fog.color.setHex(0x0c0b14);
                    renderer.setClearColor(0x0c0b14);
                    ambientLight.intensity = 0.15;
                    sunLight.intensity = 0.0;
                }
            }

            // Animate dynamic water waves
            if (waterMesh) {
                const time = clock.getElapsedTime();
                const pos = waterMesh.geometry.attributes.position;
                for (let i = 0; i < pos.count; i++) {
                    const x = pos.getX(i);
                    const z = pos.getZ(i);
                    // Sine wave displacement formula
                    const waveY = Math.sin(x * 0.05 + time * 1.5) * 0.4 + Math.cos(z * 0.05 + time * 1.2) * 0.3;
                    pos.setY(i, waveY);
                }
                pos.needsUpdate = true;
                waterMesh.geometry.computeVertexNormals();
            }

            // Step simulations
            updateBusPhysics(dt);
            updateDriverPhysics(dt);
            updateAIAndITPhysics(dt);

            if (hitchedBot && tetherVisual) {
                const points = [position.clone(), hitchedBot.position.clone()];
                tetherVisual.geometry.setFromPoints(points);
                tetherVisual.geometry.computeBoundingSphere();
                tetherVisual.geometry.computeBoundingBox();

                const distance = position.distanceTo(hitchedBot.position);
                if (distance > 6.0) {
                    const pullForceDir = hitchedBot.position.clone().sub(position).normalize();
                    const forceMag = (distance - 6.0) * 8.5;
                    velocity.addScaledVector(pullForceDir, forceMag * dt);
                }
            }

            evaluateCoinCollections();
            
            // Run proactive chatbot conversation logic
            runProactiveChatter(dt);

            // Animate dynamic particle systems
            for (let i = particleSystems.length - 1; i >= 0; i--) {
                const p = particleSystems[i];
                p.age += dt;
                
                const posAttr = p.system.geometry.attributes.position;
                for (let j = 0; j < posAttr.count; j++) {
                    const idx = j * 3;
                    posAttr.array[idx] += p.velocities[idx] * dt;
                    posAttr.array[idx + 1] += p.velocities[idx + 1] * dt;
                    posAttr.array[idx + 2] += p.velocities[idx + 2] * dt;
                    p.velocities[idx + 1] -= 9.8 * dt; 
                }
                posAttr.needsUpdate = true;

                if (p.age > p.maxAge) {
                    scene.remove(p.system);
                    particleSystems.splice(i, 1);
                }
            }

            roundTimeLeft = Math.max(0, roundTimeLeft - dt);
            const m = Math.floor(roundTimeLeft / 60);
            const s = Math.floor(roundTimeLeft % 60);
            const rTimer = document.getElementById('round-timer');
            if (rTimer) rTimer.innerText = `${m}:${s < 10 ? '0' + s : s}`;

            if (roundTimeLeft <= 0) {
                roundTimeLeft = 180;
                roundCoins = 0;
                const elRound = document.getElementById('coin-round');
                if (elRound) elRound.innerText = "0";
                terrainSeed += Math.floor(Math.random() * 50) + 1;
                addCommsChatLog("SYSTEM", "New round started! Morphed terrain randomized.");
                
                position.y = getHeight(position.x, position.z) + 15.0;
                velocity.set(0, 0, 0); 
                if (driverGroup) {
                    driverPosition.copy(position).add(new THREE.Vector3(3, 1.2, 3));
                }

                generateWorldEntities();
                buildPlayerBus();
                buildAIBuses();
                buildITChasers();
            }

            drawMinimap();
            updateCamera(dt);
            renderer.render(scene, camera);
        }

        window.onload = function() {
            initGraphics();
            animate();

            bindEvent('btn-send-chat', 'click', handleSendChat);
            bindEvent('btn-upgrade-speed', 'click', upgradeEngineSpeed);
            bindEvent('btn-repair', 'click', repairChassis);
            bindEvent('btn-hitch', 'click', toggleMagneticHitch);
            bindEvent('btn-walk', 'click', toggleOnFootWalk);
            bindEvent('btn-teleport-bus', 'click', warpBusHere);
            bindEvent('btn-flip', 'click', recoverBus);

            bindEvent('cam-chase-back', 'click', () => setCameraMode(0));
            bindEvent('cam-chase-front', 'click', () => setCameraMode(1));
            bindEvent('cam-orbit', 'click', () => setCameraMode(2));

            // Wake up Web Audio systems safely
            window.addEventListener('click', () => {
                initAudio();
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            });

            window.addEventListener('touchstart', () => {
                initAudio();
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            });

            const touchInputMap = [
                { id: 'btn-left', key: 'left' },
                { id: 'btn-right', key: 'right' },
                { id: 'btn-reverse', key: 'backward' },
                { id: 'btn-drive', key: 'forward' }
            ];

            touchInputMap.forEach(touch => {
                const btn = document.getElementById(touch.id);
                if (btn) {
                    btn.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        initAudio();
                        input[touch.key] = true;
                    });
                    btn.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        input[touch.key] = false;
                    });
                }
            });
        };

        window.addEventListener('resize', () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
